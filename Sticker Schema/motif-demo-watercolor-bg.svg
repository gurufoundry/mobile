<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" width="440" height="440">
  <defs>
    <!-- Sticker clip: rounded square inset 20px from canvas edge -->
    <clipPath id="sticker-clip">
      <rect x="20" y="20" width="400" height="400" rx="52" ry="52"/>
    </clipPath>

    <!--
      Watercolor washes — each is a radial gradient (color → transparent).
      The blur filter applied to each rect creates the soft, irregular bleed.

      Schema equivalent:
      {
        "type": "watercolor",
        "base": "paper",
        "washes": [
          { "color": "coral",  "cx": 0.28, "cy": 0.24, "r": 0.62, "opacity": 0.52 },
          { "color": "sky",    "cx": 0.72, "cy": 0.68, "r": 0.50, "opacity": 0.44 },
          { "color": "paper-2","cx": 0.18, "cy": 0.78, "r": 0.40, "opacity": 0.60 }
        ],
        "blur": 80
      }
      Note: hex values below use Bloom Lines pack palette (dusty rose, lavender, sage)
      because pack-specific palette extension tokens are resolved at render time.
    -->

    <!-- Wash 1: dusty rose — upper-left bloom -->
    <radialGradient id="wash1" cx="28%" cy="24%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F4D5C8" stop-opacity="0.78"/>
      <stop offset="45%"  stop-color="#F4D5C8" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#F4D5C8" stop-opacity="0"/>
    </radialGradient>

    <!-- Wash 2: lavender — lower-right pool -->
    <radialGradient id="wash2" cx="72%" cy="68%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#E8B4D2" stop-opacity="0.68"/>
      <stop offset="50%"  stop-color="#E8B4D2" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#E8B4D2" stop-opacity="0"/>
    </radialGradient>

    <!-- Wash 3: sage — lower-left anchor, smaller -->
    <radialGradient id="wash3" cx="18%" cy="78%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#A8C8A0" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#A8C8A0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#A8C8A0" stop-opacity="0"/>
    </radialGradient>

    <!-- Wash 4: warm cream — center-right, very faint, adds depth -->
    <radialGradient id="wash4" cx="60%" cy="40%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#E8DCC4" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#E8DCC4" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur filter for watercolor bleed — generous stdDeviation for soft spread -->
    <filter id="wc-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <!-- Slightly tighter blur for wash4 so it feels like a drier layer -->
    <filter id="wc-blur-tight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- ░░░ STICKER BODY ░░░ -->
  <g clip-path="url(#sticker-clip)">

    <!-- Base paper tone -->
    <rect x="20" y="20" width="400" height="400" fill="#F4F1EA"/>

    <!-- Watercolor wash layers — order matters: earlier = under -->
    <rect x="20" y="20" width="400" height="400" fill="url(#wash1)" filter="url(#wc-blur)"/>
    <rect x="20" y="20" width="400" height="400" fill="url(#wash2)" filter="url(#wc-blur)"/>
    <rect x="20" y="20" width="400" height="400" fill="url(#wash3)" filter="url(#wc-blur)"/>
    <rect x="20" y="20" width="400" height="400" fill="url(#wash4)" filter="url(#wc-blur-tight)"/>

    <!-- ░░░ ILLUSTRATION: sprig anchoring lower-right corner ░░░ -->
    <g transform="translate(330,290) scale(0.72) rotate(18)"
       stroke="#8B6F47" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.70">
      <path d="M 0 110 C -1 92 1 74 0 52 C -1 34 1 16 0 -10" stroke-width="5"/>
      <path d="M 0 78 C -14 71 -28 62 -40 54" stroke-width="4"/>
      <path d="M 0 78 C 14 71 28 62 40 54" stroke-width="4"/>
      <path d="M 0 40 C -12 33 -26 24 -38 16" stroke-width="3.5"/>
      <path d="M 0 40 C 12 33 26 24 38 16" stroke-width="3.5"/>
      <path d="M 0 6 C -9 -1 -20 -10 -28 -18" stroke-width="3"/>
      <path d="M 0 6 C 9 -1 20 -10 28 -18" stroke-width="3"/>
    </g>

    <!-- ░░░ ILLUSTRATION: small bud — upper-right, light ░░░ -->
    <g transform="translate(348,88) scale(0.55) rotate(-12)"
       stroke="#8B6F47" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55">
      <!-- stem -->
      <path d="M 0 70 C -1 54 1 38 0 18" stroke-width="5"/>
      <!-- bud teardrop -->
      <path d="M 0 18 C -10 8 -14 -8 -8 -20 C -4 -28 0 -34 0 -34
               C 0 -34 4 -28 8 -20 C 14 -8 10 8 0 18"
            stroke-width="4"/>
      <!-- sepals -->
      <path d="M 0 18 C 10 10 18 2 22 -8" stroke-width="3"/>
      <path d="M 0 18 C -10 10 -18 2 -22 -8" stroke-width="3"/>
    </g>

    <!-- ░░░ TEXT ░░░ -->
    <!-- Main phrase: italic Fraunces feel — rendered as SVG text with font-family fallback -->
    <text x="220" y="195"
          font-family="Fraunces, Georgia, 'Times New Roman', serif"
          font-size="72" font-style="italic" font-weight="600"
          fill="#8B6F47" text-anchor="middle" letter-spacing="-1">
      for you,
    </text>
    <text x="215" y="278"
          font-family="Fraunces, Georgia, 'Times New Roman', serif"
          font-size="88" font-style="italic" font-weight="800"
          fill="#5C3D1E" text-anchor="middle" letter-spacing="-2">
      mom.
    </text>

    <!-- Sub-label: small caps mono, very faint -->
    <text x="220" y="338"
          font-family="'JetBrains Mono', 'Courier New', monospace"
          font-size="16" font-weight="500"
          fill="#8B6F47" text-anchor="middle" letter-spacing="5" opacity="0.55">
      BLOOM LINES
    </text>

  </g>

  <!-- Sticker border — thin warm ink stroke outside the clip -->
  <rect x="20" y="20" width="400" height="400" rx="52" ry="52"
        fill="none" stroke="#8B6F47" stroke-width="3.5" opacity="0.6"/>

  <!-- Canvas label (outside sticker) -->
  <text x="220" y="432"
        font-family="Georgia, serif" font-size="11" font-style="italic"
        fill="#C4B89A" text-anchor="middle" letter-spacing="1">
    watercolor background demo · Bloom Lines palette
  </text>
</svg>
